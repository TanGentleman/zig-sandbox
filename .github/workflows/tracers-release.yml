# Cross-compile tracers for every platform the install script expects, attach
# SHA256SUMS, and cut or update a GitHub Release. Trigger: push tag v*
# (e.g. v0.1.0), or manually dispatch for an existing tag.
#
# Zig is its own cross-compiler so a single Linux runner handles every target;
# no separate macOS runner or musl container needed.
name: Tracers release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish assets for, e.g. v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  ZIG_VERSION: "0.16.0"
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-macos
            asset: tracers-darwin-arm64
          - target: x86_64-macos
            asset: tracers-darwin-amd64
          - target: x86_64-linux-gnu
            asset: tracers-linux-amd64
          - target: aarch64-linux-gnu
            asset: tracers-linux-arm64
          - target: x86_64-linux-musl
            asset: tracers-linux-amd64-musl
          - target: aarch64-linux-musl
            asset: tracers-linux-arm64-musl
    steps:
      - name: Validate release tag
        id: ver
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$ ]]; then
            echo "Release tag must look like vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-prerelease: ${RELEASE_TAG}" >&2
            exit 1
          fi
          echo "version=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Build
        working-directory: tracers
        run: |
          zig build \
            -Dtarget=${{ matrix.target }} \
            -Doptimize=ReleaseSafe \
            -Dversion=${{ steps.ver.outputs.version }}
          cp zig-out/bin/tracers "${{ github.workspace }}/${{ matrix.asset }}"

      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.asset }}
          path: ${{ matrix.asset }}

  publish:
    name: GitHub Release + SHA256SUMS
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten & checksum
        run: |
          mkdir -p release
          find artifacts -type f -name 'tracers-*' -exec cp {} release/ \;
          cd release
          sha256sum tracers-* | sort -k2 > SHA256SUMS
          echo "--- SHA256SUMS ---"
          cat SHA256SUMS

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${RELEASE_TAG}"
          REPO="${{ github.repository }}"

          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists; uploading generated assets."
            gh release upload "$TAG" release/* \
              --repo "$REPO" \
              --clobber
          else
            gh release create "$TAG" \
              --repo "$REPO" \
              --title "$TAG" \
              --generate-notes \
              --notes "Install: \`curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/tracers/scripts/install.sh | bash\`" \
              release/*
          fi
