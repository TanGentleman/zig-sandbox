# Build tracers from source, run tests, and verify the binary boots on every push and PR.
name: Tracers CI

on:
  push:
    branches: [main]
  pull_request:

env:
  ZIG_VERSION: "0.16.0"

jobs:
  test:
    name: Build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tracers
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Test
        run: zig build test

      - name: Build
        run: zig build -Doptimize=ReleaseSafe -Dversion=ci

      - name: "Smoke: binary boots"
        run: |
          ./zig-out/bin/tracers --version
          ./zig-out/bin/tracers --help
