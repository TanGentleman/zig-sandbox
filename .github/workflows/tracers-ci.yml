# Build tracers from source, run tests, and verify the binary boots on every push and PR.
name: Tracers CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ZIG_VERSION: "0.16.0"

jobs:
  test:
    name: Build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tracers
    steps:
      - uses: actions/checkout@v4

      - name: Script checks
        run: |
          bash -n scripts/install.sh scripts/cut-release.sh
          if grep -Fq 'tracers-install-$$' scripts/install.sh; then
            echo "install.sh must use mktemp -d for its download directory" >&2
            exit 1
          fi
          grep -Fq 'mktemp -d' scripts/install.sh

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Test
        run: zig build test

      - name: Build
        run: zig build -Doptimize=ReleaseSafe -Dversion=ci

      - name: "Smoke: binary boots"
        run: |
          ./zig-out/bin/tracers --version
          ./zig-out/bin/tracers --help
