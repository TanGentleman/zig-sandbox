# Download the just-published release binaries and make sure they actually run.
# Also exercises install.sh end-to-end.
name: Tracers release smoke

on:
  release:
    types: [published]

jobs:
  binary:
    name: Binary (${{ matrix.asset }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            asset: tracers-linux-amd64
          - runner: macos-14
            asset: tracers-darwin-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Download release binary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ github.event.release.tag_name }}" \
            --pattern "${{ matrix.asset }}" --dir .
          chmod +x "${{ matrix.asset }}"
          mv "${{ matrix.asset }}" tracers

      - name: "Smoke: binary boots"
        run: |
          ./tracers --version
          ./tracers --help

  install-script:
    name: install.sh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install via install.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash tracers/scripts/install.sh "${{ github.event.release.tag_name }}"

      - name: "Smoke: installed binary boots"
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          tracers --version
          tracers --help
